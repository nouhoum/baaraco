# =============================================================================
# golangci-lint configuration
# =============================================================================
# Run: golangci-lint run ./...

run:
  timeout: 5m
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - nakedret
    - prealloc
    - exportloopref
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck

  disable:
    - scopelint # deprecated
    - golint    # deprecated, use revive
    - maligned  # deprecated

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  goimports:
    local-prefixes: github.com/baaraco/baara

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - errcheck
        - unparam

    # Exclude known false positives
    - linters:
        - staticcheck
      text: "SA1019:"  # Using deprecated functions

  max-issues-per-linter: 50
  max-same-issues: 3
