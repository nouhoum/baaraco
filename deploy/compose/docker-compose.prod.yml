# =============================================================================
# Docker Compose - Production
# =============================================================================
# Deploy with Dokploy or: docker compose -f deploy/compose/docker-compose.prod.yml up -d
#
# Required environment variables (set in Dokploy or .env):
# - API_IMAGE, WEB_IMAGE, WORKER_IMAGE
# - DATABASE_URL, REDIS_URL
# - MINIO_* credentials
# - SMTP_* credentials
# - JWT_SECRET
# - DOMAIN, API_DOMAIN, APP_DOMAIN

name: baara

services:
  # ---------------------------------------------------------------------------
  # Traefik (Reverse Proxy)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.2
    container_name: baara-traefik
    restart: always
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - baara-network
    labels:
      - "traefik.enable=true"
      # Dashboard (optional, protect in production)
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-baara.co}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH:-}"

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: baara-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-baara}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-baara}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - baara-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-baara} -d ${DB_NAME:-baara}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: baara-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - baara-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: baara-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - baara-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Database Migrations (one-shot)
  # ---------------------------------------------------------------------------
  migrate:
    image: ${API_IMAGE:-baara-api:latest}
    container_name: baara-migrate
    entrypoint: ["/app/api"]
    command: ["migrate", "-direction", "up"]
    environment:
      DATABASE_URL: postgres://${DB_USER:-baara}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-baara}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - baara-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------
  api:
    image: ${API_IMAGE:-baara-api:latest}
    container_name: baara-api
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8080
      DATABASE_URL: postgres://${DB_USER:-baara}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-baara}?sslmode=disable
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-baara}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-baara}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-baara-uploads}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:-baara.co},https://${APP_DOMAIN:-app.baara.co}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - baara-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.baara.co}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=secure-api@file"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # Worker
  # ---------------------------------------------------------------------------
  worker:
    image: ${WORKER_IMAGE:-baara-worker:latest}
    container_name: baara-worker
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgres://${DB_USER:-baara}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-baara}?sslmode=disable
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-baara}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-baara}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@baara.co}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Baara}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - baara-network

  # ---------------------------------------------------------------------------
  # Web (Remix)
  # ---------------------------------------------------------------------------
  web:
    image: ${WEB_IMAGE:-baara-web:latest}
    container_name: baara-web
    restart: always
    environment:
      NODE_ENV: production
      VITE_API_URL: https://${API_DOMAIN:-api.baara.co}
    depends_on:
      - api
    networks:
      - baara-network
    labels:
      - "traefik.enable=true"
      # Main domain
      - "traefik.http.routers.web.rule=Host(`${DOMAIN:-baara.co}`) || Host(`${APP_DOMAIN:-app.baara.co}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web.middlewares=secure-web@file"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

volumes:
  traefik-letsencrypt:
  postgres-data:
  redis-data:
  minio-data:

networks:
  baara-network:
    driver: bridge
