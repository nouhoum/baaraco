# =============================================================================
# Docker Compose - Production (Dokploy)
# =============================================================================
# Deployed via Dokploy. PostgreSQL and Redis are shared Dokploy services.
#
# Required environment variables (set in Dokploy UI):
# - API_IMAGE, WEB_IMAGE, WORKER_IMAGE
# - DATABASE_URL (points to shared PostgreSQL)
# - REDIS_HOST, REDIS_PORT, REDIS_PASSWORD (shared Redis)
# - MINIO_ACCESS_KEY, MINIO_SECRET_KEY
# - SMTP_* credentials
# - JWT_SECRET
# - DOMAIN, API_DOMAIN, APP_DOMAIN

services:
  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible storage - specific to Baara)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: baara-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Database Migrations (one-shot)
  # ---------------------------------------------------------------------------
  migrate:
    image: ${API_IMAGE:-baara-api:latest}
    container_name: baara-migrate
    entrypoint: ["/app/api"]
    command: ["migrate", "-direction", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------
  api:
    image: ${API_IMAGE:-baara-api:latest}
    container_name: baara-api
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-baara-uploads}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:-baara.co},https://${APP_DOMAIN:-app.baara.co}
    depends_on:
      migrate:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.baara-api.rule=Host(`${API_DOMAIN:-api.baara.co}`)"
      - "traefik.http.routers.baara-api.entrypoints=websecure"
      - "traefik.http.routers.baara-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.baara-api.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # Worker
  # ---------------------------------------------------------------------------
  worker:
    image: ${WORKER_IMAGE:-baara-worker:latest}
    container_name: baara-worker
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@baara.co}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Baara}

  # ---------------------------------------------------------------------------
  # Web (Remix)
  # ---------------------------------------------------------------------------
  web:
    image: ${WEB_IMAGE:-baara-web:latest}
    container_name: baara-web
    restart: always
    environment:
      NODE_ENV: production
      VITE_API_URL: https://${API_DOMAIN:-api.baara.co}
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.baara-web.rule=Host(`${DOMAIN:-baara.co}`) || Host(`${APP_DOMAIN:-app.baara.co}`)"
      - "traefik.http.routers.baara-web.entrypoints=websecure"
      - "traefik.http.routers.baara-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.baara-web.loadbalancer.server.port=3000"

volumes:
  minio-data:
